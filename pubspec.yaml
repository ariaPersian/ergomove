name: ergomove
version: 0.1.0+1
description: Bilingual ergonomic break reminder app for office and computer workers.
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  shared_preferences: ^2.5.5
  tray_manager: ^0.5.3
  window_manager: ^0.5.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - content/en/reminders.json
    - content/fa/reminders.json
    - assets/images/
